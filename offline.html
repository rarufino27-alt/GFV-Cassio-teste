<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RF Motorista – Offline</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="core/ui/rf-theme-motorista.css">

<script src="core/datamanager.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  text-align:center;
  padding:25px;
}

.container{
  width:100%;
  max-width:420px;
}

.logo{
  font-size:2.8rem;
  font-weight:900;
  margin-bottom:10px;
  letter-spacing:2px;
}

.status{
  font-size:1.1rem;
  font-weight:700;
  margin-top:10px;
  opacity:.9;
}

.subtitle{
  font-size:.85rem;
  opacity:.6;
  margin-top:8px;
  margin-bottom:40px;
}

.credit-info{
  margin-bottom:25px;
  font-size:.9rem;
  opacity:.8;
}

.credit-info span{
  color:var(--rf-gold-strong);
  font-weight:700;
}

.rf-btn-gold{
  width:100%;
}

.rf-btn-red{
  width:100%;
}

.warning{
  margin-top:15px;
  font-size:.8rem;
  color:var(--rf-red);
  display:none;
}

.terms{
  margin-top:35px;
  font-size:.75rem;
  opacity:.6;
  line-height:1.4;
}

.terms a{
  color:var(--rf-gold-strong);
  text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">RF</div>
  <div class="status">SISTEMA OFFLINE</div>
  <div class="subtitle">Ative para começar a receber viagens</div>

  <div class="credit-info">
    Créditos disponíveis: <span id="creditosValor">0.00</span>
  </div>

  <button id="btnOnline" class="rf-btn-gold rf-breath" onclick="ficarOnline()">
    FICAR ONLINE
  </button>

  <div class="warning" id="warningMsg">
    Créditos insuficientes para iniciar.
  </div>

  <div class="terms">
    Ao continuar, você concorda com nossos
    <a href="termos.html" target="_blank">Termos de Uso</a>
    e
    <a href="politica-privacidade.html" target="_blank">Política de Privacidade</a>.
  </div>

</div>

<script>

/* ================= INICIALIZAÇÃO ================= */

document.addEventListener("DOMContentLoaded", ()=>{

  atualizarCreditos();

  if(DataManager.isOnline()){
    window.location.href = "driver-home.html";
  }

});

/* ================= ATUALIZAR CRÉDITO ================= */

function atualizarCreditos(){
  const creditos = DataManager.getCreditos();
  document.getElementById("creditosValor").innerText = creditos.toFixed(2);
}

/* ================= FICAR ONLINE ================= */

function ficarOnline(){

  const creditos = DataManager.getCreditos();

  if(creditos <= 0){
    document.getElementById("warningMsg").style.display="block";
    return;
  }

  DataManager.setOnline(true);

  document.body.style.transition="opacity .25s ease, transform .25s ease";
  document.body.style.opacity="0";
  document.body.style.transform="scale(.98)";

  setTimeout(()=>{
    window.location.href="driver-home.html";
  },250);
}

</script>

</body>
</html>
