<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>GFV – Viagem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="core/datamanager.js"></script>

<link rel="stylesheet" href="theme.css/theme.css">
<link rel="stylesheet" href="theme.css/layout.css">
<link rel="stylesheet" href="theme.css/components.css">

</head>

<body>

<div id="loading" class="loading">
<div class="loader"></div>
<span>Carregando rotas...</span>
</div>

<div class="menu-overlay" id="menuOverlay" onclick="fecharMenu()"></div>

<div class="menu" id="menu">
<h3>Menu</h3>

<div class="menu-item" onclick="irPara('termos.html')">
📜 Regras do Grupo GFV
</div>

<div class="menu-item" onclick="irPara('configuracoes.html')">
⚙️ Configurações
</div>

</div>

<div class="top-white">
<div class="logo-area">
<img src="icons/logo-1024.png" class="logo-img" onerror="this.src='icons/icon-512.png'">
<span class="logo-text-dark">GFV MOTORISTA</span>
</div>
<div class="menu-btn-dark" onclick="abrirMenu()">☰</div>
</div>

<div class="center">

<div class="titulo-central">
Para onde <span>vamos</span> hoje?
</div>

<div class="card">

<div class="campo" id="origemBtn">
<div class="campo-left">
<div class="dot origem"></div>
<div id="origemTexto">Selecionar origem</div>
</div>
</div>

<div class="campo" id="destinoBtn">
<div class="campo-left">
<div class="dot destino"></div>
<div id="destinoTexto">Selecionar destino</div>
</div>
</div>

<div class="campo" id="tipoCarroBtn">
<div class="campo-left">
<div class="dot" style="background:#3b82f6;"></div>
<div>Tipo de veículo</div>
</div>

<div class="rf-select">
<span id="tipoCarroTexto">4 lugares</span>
</div>

<input type="hidden" id="tipoCarro" value="1">
</div>

</div>
</div>

<div class="bottom">
<button id="confirmar">Confirmar rota</button>
</div>

<!-- MODAL LISTA -->
<div class="modal" id="modal">
<div class="modal-content">
<input type="text" id="busca" placeholder="Buscar...">
<div class="lista" id="lista"></div>
</div>
</div>

<!-- MODAL VEÍCULO CENTRALIZADO -->
<div id="modalTipoCarro" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
z-index:999;
">

<div style="
background:#1c1c1c;
padding:20px;
border-radius:16px;
width:90%;
max-width:300px;
border:1px solid rgba(255,255,255,.1);
">

<div class="rf-option" data-value="1">4 lugares</div>
<div class="rf-option" data-value="1.5">6 lugares (+50%)</div>

</div>
</div>

<script>

/* INIT */
async function init(){
const loading = document.getElementById("loading");
loading.style.display="flex";

try{
await DataManager.carregar();
}catch(e){
alert("Erro ao carregar rotas");
console.error(e);
}

loading.style.display="none";
}
init();

/* MENU */
function abrirMenu(){
menu.classList.add("ativo");
menuOverlay.style.display="block";
}
function fecharMenu(){
menu.classList.remove("ativo");
menuOverlay.style.display="none";
}
function irPara(p){
window.location.href=p;
}

/* TEMA */
(function(){
const temaSalvo=localStorage.getItem("rf_theme")||"dark";
document.body.setAttribute("data-theme",temaSalvo);
})();

/* =========================
SELEÇÃO ORIGEM / DESTINO
========================= */

let origem = null;
let destino = null;
let tipoSelecionando = null;

const modal = document.getElementById("modal");
const lista = document.getElementById("lista");

document.getElementById("origemBtn").onclick = ()=>{
tipoSelecionando = "origem";
abrirLista(DataManager.listarOrigens());
};

document.getElementById("destinoBtn").onclick = ()=>{
if(!origem){
alert("Selecione a origem primeiro");
return;
}
tipoSelecionando = "destino";
abrirLista(DataManager.listarDestinos(origem));
};

function abrirLista(itens){
lista.innerHTML = "";
itens.forEach(item=>{
const div = document.createElement("div");
div.innerText = item;
div.style.padding="12px";
div.onclick = ()=>selecionar(item);
lista.appendChild(div);
});
modal.style.display="flex";
}

function selecionar(valor){

if(tipoSelecionando === "origem"){
origem = valor;
document.getElementById("origemTexto").innerText = valor;
}

if(tipoSelecionando === "destino"){
destino = valor;
document.getElementById("destinoTexto").innerText = valor;
}

modal.style.display="none";
}

/* =========================
TIPO DE VEÍCULO (CORRIGIDO)
========================= */

const modalTipo = document.getElementById("modalTipoCarro");

document.getElementById("tipoCarroBtn").onclick = ()=>{
modalTipo.style.display = "flex";
};

modalTipo.onclick = (e)=>{
if(e.target === modalTipo){
modalTipo.style.display = "none";
}
};

document.querySelectorAll(".rf-option").forEach(op=>{
op.onclick = ()=>{
document.getElementById("tipoCarro").value = op.dataset.value;
document.getElementById("tipoCarroTexto").innerText = op.innerText;
modalTipo.style.display="none";
};
});

</script>

</body>
</html>
