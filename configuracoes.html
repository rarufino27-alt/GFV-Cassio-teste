<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configurações - GFV Viagens</title>

<!-- CSS PADRÃO -->
<link rel="stylesheet" href="theme.css/theme.css">
<link rel="stylesheet" href="theme.css/layout.css">
<link rel="stylesheet" href="theme.css/components.css">

</head>
<body data-theme="dark">

<!-- HEADER -->
<div class="top-bar">
  <div class="logo-area">
    <img src="icons/icon-192.png" class="logo-img">
    <span class="logo-text">GFV VIAGENS</span>
  </div>
</div>

<!-- CONTAINER -->
<div class="container">

  <div class="titulo">
    Configurações
  </div>

  <!-- CARD PREFERÊNCIAS -->
  <div class="card">

    <div class="card-title">Preferências</div>

    <div class="option" onclick="alternarTema()">
      <span>Alternar tema</span>
      <span id="temaAtual"></span>
    </div>

  </div>

  <!-- CARD SISTEMA -->
  <div class="card">

    <div class="card-title">Sistema</div>

    <div class="option">
      <span>Versão do aplicativo</span>
      <span>1.0.1</span>
    </div>

    <div class="option" onclick="abrirSuporte()">
      <span>Contato do suporte</span>
      <span>WhatsApp</span>
    </div>

  </div>

  <!-- VOLTAR -->
  <div style="margin-top:10px;">
    <a href="index.html" class="link-voltar">← Voltar</a>
  </div>

</div>

<script>

/* =========================
   TEMA (PADRÃO GLOBAL)
========================= */
(function(){
  const tema = localStorage.getItem("gfv_theme") || "dark";
  document.body.setAttribute("data-theme", tema);
  atualizarLabel();
})();

function alternarTema(){
  const atual = document.body.getAttribute("data-theme");
  const novo = atual === "dark" ? "light" : "dark";

  document.body.setAttribute("data-theme", novo);
  localStorage.setItem("gfv_theme", novo);

  atualizarLabel();
}

function atualizarLabel(){
  const atual = document.body.getAttribute("data-theme");

  document.getElementById("temaAtual").innerText =
    atual === "dark" ? "🌙 Escuro" : "☀️ Claro";
}

/* =========================
   SUPORTE
========================= */
function abrirSuporte(){
  const mensagem = encodeURIComponent("Olá, preciso de suporte no aplicativo GFV.");
  window.open(`https://wa.me/5581989823239?text=${mensagem}`, "_blank");
}

</script>

</body>
</html>
